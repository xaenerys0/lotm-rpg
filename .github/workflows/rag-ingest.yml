name: RAG ingest

# Embed the canon corpus (novel + wiki) into the private source_chunks /
# chunk_embeddings tables. The corpus rarely changes, embedding is expensive
# (~45 min), and it writes past RLS with a service-role key — so it runs
# MANUALLY ONLY (workflow_dispatch), never automatically on a merge. Trigger it
# from the Actions tab whenever the canon sources or the RAG pipeline change.
on:
  workflow_dispatch:
    inputs:
      models:
        description: Approved embedding model id(s), comma-separated.
        default: qwen3-embedding-0.6b,bge-m3
      wiki_concealment_tier:
        description: >
          Concealment tier to load wiki chunks at (spoiler gate). Leave blank to
          use the repo variable RAG_WIKI_CONCEALMENT_TIER, else 0.
        default: ""

# Never cancel an in-flight run mid-load — a partial DB write should finish.
concurrency:
  group: rag-ingest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate on the operator secrets so the workflow skips cleanly on forks /
  # Dependabot (which can't read them) instead of failing.
  gate:
    name: Check ingestion secrets
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          SUPA_URL: ${{ secrets.RAG_SUPABASE_URL }}
          SERVICE_ROLE: ${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -n "$SUPA_URL" ] && [ -n "$SERVICE_ROLE" ] && [ -n "$CF_ACCOUNT_ID" ] && [ -n "$CF_API_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::RAG ingestion secrets absent — skipping (expected on forks/Dependabot)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  ingest:
    name: Embed corpus → source_chunks / chunk_embeddings
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Materialize LFS by hand below so we fetch only what we ingest.
          lfs: false

      # Pull just the raw sources (EPUB + wiki .7z). The committed, extracted
      # .xml is redundant here — we extract from the .7z ourselves — so skip it.
      - name: Materialize LFS sources
        run: git lfs pull --include="corpus/novel/*.EPUB,corpus/wiki/*.7z"

      - name: Set up Node & pnpm
        uses: ./.github/actions/setup

      - name: Extract wiki dump
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          mkdir -p /tmp/wiki
          7z x -y -o/tmp/wiki corpus/wiki/lordofthemystery_pages_current.xml.7z
          # 7z restores each entry's stored Unix mode, and this archive's is
          # missing owner-read — so the parser (createReadStream) hits EACCES.
          # The runner owns the extracted file, so re-grant read/search here.
          chmod -R u+rwX /tmp/wiki

      # parse → chunk → embed → load. The embed stage validates --model against
      # APPROVED_EMBEDDING_MODELS (no new id leaks into the model-keyed store)
      # and the load stage upserts by deterministic UUID (idempotent — a re-run
      # never duplicates rows, so live saves keep matching).
      - name: Ingest corpus
        env:
          SUPABASE_URL: ${{ secrets.RAG_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}
          # Hosted embedding via Cloudflare Workers AI — CI is Node (no CORS), so
          # the embed stage hits the Cloudflare REST API directly with the
          # operator's token. Cloudflare hosts BOTH approved models.
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          MODELS: ${{ inputs.models || 'qwen3-embedding-0.6b,bge-m3' }}
          # Pin the wiki spoiler gate so a re-ingest never silently lowers it:
          # dispatch input → repo variable → 0. `load` upserts concealment_tier,
          # so this must match the intended tier on every run.
          WIKI_TIER: ${{ inputs.wiki_concealment_tier || vars.RAG_WIKI_CONCEALMENT_TIER || '0' }}
        run: |
          set -euo pipefail

          # Resolve the extracted dump by glob — 7z names the entry from inside
          # the archive, which need not equal the .7z basename.
          shopt -s nullglob
          wiki_xmls=(/tmp/wiki/*.xml)
          wiki_xml="${wiki_xmls[0]:-}"
          if [ -z "$wiki_xml" ]; then
            echo "::error::No extracted wiki XML found in /tmp/wiki" >&2
            exit 1
          fi

          # Parse + chunk each corpus once; the chunk sets are reused per model.
          pnpm rag:novel corpus/novel/LordofMysteriesCuttlefishTha1.EPUB /tmp/novel-docs.jsonl
          pnpm rag:chunk /tmp/novel-docs.jsonl /tmp/novel-chunks.jsonl
          pnpm rag:wiki "$wiki_xml" /tmp/wiki-docs.jsonl --concealment-tier "$WIKI_TIER"
          pnpm rag:chunk /tmp/wiki-docs.jsonl /tmp/wiki-chunks.jsonl

          # Embed + load once per approved model (each model is its own vector map).
          IFS=',' read -ra ids <<< "$MODELS"
          for raw in "${ids[@]}"; do
            # Trim surrounding whitespace (parameter expansion — no subshell, and
            # safe for values xargs would choke on).
            model="${raw#"${raw%%[![:space:]]*}"}"
            model="${model%"${model##*[![:space:]]}"}"
            [ -z "$model" ] && continue
            echo "::group::Embed + load ($model)"
            # Account run base; the embed stage appends each model's Cloudflare id.
            cf_base="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/ai/run"
            pnpm rag:embed --model "$model" --provider cloudflare \
              --base-url "$cf_base" \
              /tmp/novel-chunks.jsonl "/tmp/novel.$model.jsonl"
            pnpm rag:embed --model "$model" --provider cloudflare \
              --base-url "$cf_base" \
              /tmp/wiki-chunks.jsonl "/tmp/wiki.$model.jsonl"
            pnpm rag:load "/tmp/novel.$model.jsonl" --model "$model"
            pnpm rag:load "/tmp/wiki.$model.jsonl" --model "$model"
            echo "::endgroup::"
          done
